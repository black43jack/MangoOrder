<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sudha Farms</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
:root{--green:#16a34a;--light:#f5f5f5;--card:#ffffff;--text:#222}
*{box-sizing:border-box}
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto; background:var(--light); color:var(--text);} 
.header { position:fixed; top:0; width:100%; background:#fff; padding:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); z-index:1000; }
.title { font-size:18px; font-weight:700; }
.subtitle { color:var(--green); font-size:12px; margin-top:2px }
.container { padding:80px 12px 80px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.card { background:var(--card); border-radius:14px; padding:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
.card img { width:100%; border-radius:10px; object-fit:cover; height:130px; }
.card h4 { margin:6px 0 4px; font-size:14px; }

.controls { display:flex; flex-direction:column; align-items:flex-start; gap:6px }
.options { display:flex; gap:6px }
.opt { padding:6px 10px; border-radius:8px; border:1px solid #ddd; font-size:12px; cursor:pointer }
.opt.active { background:var(--green); color:#fff; border:none }
.qty { display:flex; align-items:center; gap:10px }
.btn { background:#eee; border:none; padding:6px 10px; border-radius:6px; font-size:14px }
.count { font-weight:600; min-width:20px; text-align:center }

.kesar { grid-column: span 2; }
.hidden { display:none; }
.page { padding:20px; }
input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd }

.footer { position:fixed; bottom:0; width:100%; background:#fff; padding:10px; box-shadow:0 -2px 8px rgba(0,0,0,0.08); }
.checkout { background:var(--green); color:#fff; padding:12px; text-align:center; border-radius:10px; font-weight:600; cursor:pointer; }
.btn-back { background:#666; color:#fff; padding:12px; text-align:center; border-radius:10px; font-weight:600; cursor:pointer; margin-top:10px; }

/* Receipt Styling */
#receiptArea { background: white; padding: 20px; border: 2px dashed #ddd; border-radius: 10px; margin-bottom: 20px; }
</style>
</head>
<body>

<div class="header">
  <div class="title">Sudha Farms</div>
  <div class="subtitle">Delivery only in Hyderabad</div>
</div>

<!-- PAGE 1: MAIN MENU -->
<div id="mainPage" class="container">
  <div class="grid">
    <div class="card kesar">
      <img src="./images/Kesar.jpg">
      <h4>Kesar</h4>
      <div class="controls">
        <div class="options">
          <div class="opt active" onclick="selectSize('kesar',3,this)">3 kg</div>
          <div class="opt" onclick="selectSize('kesar',5,this)">5 kg</div>
        </div>
        <div class="qty">
          <button class="btn" onclick="updateQty('kesar', -1)">-</button>
          <span id="kesar" class="count">1</span>
          <button class="btn" onclick="updateQty('kesar', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="./images/Banganapalli.jpg">
      <h4>Banganapalli</h4>
      <div class="controls">
        <div class="options">
          <div class="opt active" onclick="selectSize('banganapalli',3,this)">3 kg</div>
          <div class="opt" onclick="selectSize('banganapalli',5,this)">5 kg</div>
        </div>
        <div class="qty">
          <button class="btn" onclick="updateQty('banganapalli', -1)">-</button>
          <span id="banganapalli" class="count">0</span>
          <button class="btn" onclick="updateQty('banganapalli', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="./images/Seeri.jpg">
      <h4>Seeri</h4>
      <div class="controls">
        <div class="options">
          <div class="opt active" onclick="selectSize('seeri',3,this)">3 kg</div>
          <div class="opt" onclick="selectSize('seeri',5,this)">5 kg</div>
        </div>
        <div class="qty">
          <button class="btn" onclick="updateQty('seeri', -1)">-</button>
          <span id="seeri" class="count">0</span>
          <button class="btn" onclick="updateQty('seeri', 1)">+</button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="footer" id="mainFooter">
  <div class="checkout" onclick="goToSummary()">Checkout</div>
</div>

<!-- PAGE 2: SUMMARY -->
<div id="summaryPage" class="page container hidden">
  <h3>Order Summary</h3>
  <div id="summary"></div>
  <div class="checkout" onclick="goToDetails()" style="margin-top:20px">Confirm & Enter Details</div>
  <div class="btn-back" onclick="goBack('mainPage')">Back to Menu</div>
</div>

<!-- PAGE 3: DETAILS -->
<div id="detailsPage" class="page container hidden">
  <h3>Enter Details</h3>
  <input placeholder="Full Name" id="custName">
  <input placeholder="Phone Number" id="custPhone" type="tel">
  <textarea placeholder="Delivery Address" id="custAddress" rows="3"></textarea>
  <div class="checkout" onclick="placeOrder()">Confirm and Place Order</div>
  <div class="btn-back" onclick="goBack('summaryPage')">Back</div>
</div>

<!-- PAGE 4: SUCCESS -->
<div id="successPage" class="page container hidden">
  <div id="receiptArea">
    <h2 style="color:var(--green); margin-top:0">Order Confirmed!</h2>
    <div id="finalOrderList"></div>
    <hr>
    <div id="finalDetails"></div>
  </div>
  <div class="checkout" onclick="downloadJPG()">Download Receipt (JPG)</div>
  <div class="btn-back" onclick="location.reload()">New Order</div>
</div>

<script>
let cart = {
 kesar:{count:1,size:3},
 banganapalli:{count:0,size:3},
 seeri:{count:0,size:3}
};

// --- TELEGRAM CONFIG ---
const BOT_TOKEN = "8712573597:AAEHK2ykhiLhFTJrPIVIfFgJ5uqpkoTgsWA"; 
const CHAT_ID = "-1003967477361";

function selectSize(item,size,el){
 cart[item].size=size;
 let siblings=el.parentNode.children;
 for(let s of siblings){s.classList.remove('active')}
 el.classList.add('active');
}

function updateQty(item,val){
 cart[item].count=Math.max(0,cart[item].count+val);
 document.getElementById(item).innerText=cart[item].count;
}

function goBack(targetId) {
  document.querySelectorAll('.container').forEach(p => p.classList.add('hidden'));
  document.getElementById(targetId).classList.remove('hidden');
  if(targetId === 'mainPage') document.getElementById('mainFooter').classList.remove('hidden');
}

function goToSummary(){
 let hasItem=false;
 let summaryHtml='';
 for(let item in cart){
  if(cart[item].count>0){
    hasItem=true;
    summaryHtml+=`<p><b>${item.toUpperCase()}</b>: ${cart[item].count} units (${cart[item].count*cart[item].size} kg total)</p>`;
  }
 }
 if(!hasItem){alert('Add items first');return}
 document.getElementById('mainPage').classList.add('hidden');
 document.getElementById('mainFooter').classList.add('hidden');
 document.getElementById('summaryPage').classList.remove('hidden');
 document.getElementById('summary').innerHTML=summaryHtml;
 document.getElementById('finalOrderList').innerHTML=summaryHtml;
}

function goToDetails(){
 document.getElementById('summaryPage').classList.add('hidden');
 document.getElementById('detailsPage').classList.remove('hidden');
}

async function placeOrder(){
 const name = document.getElementById('custName').value;
 const phone = document.getElementById('custPhone').value;
 const addr = document.getElementById('custAddress').value;

 if(!name || !phone || !addr) { alert("Please fill all details"); return; }

 document.getElementById('finalDetails').innerHTML = `<p><b>Name:</b> ${name}<br><b>Phone:</b> ${phone}<br><b>Address:</b> ${addr}</p>`;

 // Telegram Message
 let text = `🚀 *NEW ORDER RECEIVED*%0A%0A`;
 for(let item in cart){
    if(cart[item].count > 0) text += `• ${item}: ${cart[item].count * cart[item].size}kg%0A`;
 }
 text += `%0A👤 *Name:* ${name}%0A📞 *Phone:* ${phone}%0A📍 *Address:* ${addr}`;

 try {
    const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage?chat_id=${CHAT_ID}&text=${text}&parse_mode=Markdown`);
    if(response.ok) {
        document.getElementById('detailsPage').classList.add('hidden');
        document.getElementById('successPage').classList.remove('hidden');
    } else {
        alert("Telegram error. Check Bot Token or Chat ID.");
    }
 } catch(e) {
    alert("Network error. Could not send order.");
 }
}

function downloadJPG(){
  html2canvas(document.querySelector("#receiptArea")).then(canvas => {
    let link = document.createElement('a');
    link.download = 'SudhaFarms_Order.jpg';
    link.href = canvas.toDataURL("image/jpeg");
    link.click();
  });
}
</script>
</body>
</html>
