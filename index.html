<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sudha Farms</title>
<style>
:root{--green:#16a34a;--light:#f5f5f5;--card:#ffffff;--text:#222}
*{box-sizing:border-box}
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto; background:var(--light); color:var(--text);} 
.header { position:fixed; top:0; width:100%; background:#fff; padding:12px; box-shadow:0 2px 8px rgba(0,0,0,0.08); z-index:1000; }
.title { font-size:18px; font-weight:700; }
.subtitle { color:var(--green); font-size:12px; margin-top:2px }
.container { padding:80px 12px 80px; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
.card { background:var(--card); border-radius:14px; padding:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
.card img { width:100%; border-radius:10px; object-fit:cover; height:130px; }
.card h4 { margin:6px 0 4px; font-size:14px; }

/* LEFT ALIGNED CONTROLS */
.controls { display:flex; flex-direction:column; align-items:flex-start; gap:6px }
.options { display:flex; gap:6px }
.opt { padding:6px 10px; border-radius:8px; border:1px solid #ddd; font-size:12px; cursor:pointer }
.opt.active { background:var(--green); color:#fff; border:none }
.qty { display:flex; align-items:center; gap:10px }
.btn { background:#eee; border:none; padding:6px 10px; border-radius:6px; font-size:14px }
.count { font-weight:600; min-width:20px; text-align:center }

.kesar { grid-column: span 2; }
.hidden { display:none; }
.page { padding:20px; }
input, textarea { width:100%; padding:12px; margin:10px 0; border-radius:8px; border:1px solid #ddd }

.footer {
 position:fixed; bottom:0; width:100%; background:#fff; padding:10px; box-shadow:0 -2px 8px rgba(0,0,0,0.08);
}
.checkout {
 background:var(--green); color:#fff; padding:12px; text-align:center; border-radius:10px; font-weight:600; cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
  <div class="title">Sudha Farms</div>
  <div class="subtitle">Delivery only in Hyderabad</div>
</div>

<div id="mainPage" class="container">
  <div class="grid">

    <!-- KESAR (DEFAULT SELECTED) -->
    <div class="card kesar">
      <img src="./images/kesar.jpg">
      <h4>Kesar</h4>
      <div class="controls">
        <div class="options">
          <div class="opt active" id="kesar-3" onclick="selectSize('kesar',3,this)">3 kg</div>
          <div class="opt" onclick="selectSize('kesar',5,this)">5 kg</div>
        </div>
        <div class="qty">
          <button class="btn" onclick="updateQty('kesar', -1)">-</button>
          <span id="kesar" class="count">1</span>
          <button class="btn" onclick="updateQty('kesar', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="./images/banganapalli.jpg">
      <h4>Banganapalli</h4>
      <div class="controls">
        <div class="options">
          <div class="opt" onclick="selectSize('banganapalli',3,this)">3 kg</div>
          <div class="opt" onclick="selectSize('banganapalli',5,this)">5 kg</div>
        </div>
        <div class="qty">
          <button class="btn" onclick="updateQty('banganapalli', -1)">-</button>
          <span id="banganapalli" class="count">0</span>
          <button class="btn" onclick="updateQty('banganapalli', 1)">+</button>
        </div>
      </div>
    </div>

    <div class="card">
      <img src="./images/seeri.jpg">
      <h4>seeri</h4>
      <div class="controls">
        <div class="options">
          <div class="opt" onclick="selectSize('seeri',3,this)">3 kg</div>
          <div class="opt" onclick="selectSize('seeri',5,this)">5 kg</div>
        </div>
        <div class="qty">
          <button class="btn" onclick="updateQty('seeri', -1)">-</button>
          <span id="seeri" class="count">0</span>
          <button class="btn" onclick="updateQty('seeri', 1)">+</button>
        </div>
      </div>
    </div>

  </div>
</div>

<div class="footer">
  <div class="checkout" onclick="goToSummary()">Checkout</div>
</div>

<div id="summaryPage" class="page hidden">
  <h3>Order Summary</h3>
  <div id="summary"></div>
  <button onclick="confirmOrder()">Confirm</button>
</div>

<div id="detailsPage" class="page hidden">
  <h3>Enter Details</h3>
  <input placeholder="Name" id="name">
  <input placeholder="Phone">
  <textarea placeholder="Address"></textarea>
  <button>Submit</button>
</div>

<script>
let cart = {
 kesar:{count:1,size:3},
 banganapalli:{count:0,size:0},
 seeri:{count:0,size:0}
};

function selectSize(item,size,el){
 cart[item].size=size;
 let siblings=el.parentNode.children;
 for(let s of siblings){s.classList.remove('active')}
 el.classList.add('active');
}

function updateQty(item,val){
 if(cart[item].size===0){alert('Select size first');return}
 cart[item].count=Math.max(0,cart[item].count+val);
 document.getElementById(item).innerText=cart[item].count;
}

function goToSummary(){
 let hasItem=false;
 let summary='';
 for(let item in cart){
  if(cart[item].count>0){
    hasItem=true;
    let kg=cart[item].count*cart[item].size;
    summary+=item+" - "+kg+" kg<br>";
  }
 }
 if(!hasItem){alert('Add items first');return}
 document.getElementById('mainPage').classList.add('hidden');
 document.querySelector('.footer').classList.add('hidden');
 document.getElementById('summaryPage').classList.remove('hidden');
 document.getElementById('summary').innerHTML=summary;
}

function confirmOrder(){
 localStorage.setItem('orderConfirmed','true');
 document.getElementById('summaryPage').classList.add('hidden');
 document.getElementById('detailsPage').classList.remove('hidden');
}
</script>

</body>
</html>
